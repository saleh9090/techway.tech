<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Expense | Fateer Wa Khameer Accounting</title>
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="../index.html">
          <strong>Fateer Wa Khameer</strong>
          <span>Accounting System</span>
        </a>
        <a class="nav-link" href="../index.html">Dashboard</a>
        <div class="nav-group-label">Expenses</div>
        <a class="nav-link is-active" href="index.html">Expenses</a>
        <a class="nav-link" href="../expense-categories/index.html">Expenses Categories</a>
      </aside>

      <main class="main">
        <header class="page-header">
          <div>
            <h1 class="page-title">Edit Expense</h1>
            <p class="page-subtitle">After saving, you will return to the expenses index.</p>
          </div>
        </header>

        <form class="form-panel form-grid" data-expense-form>
          <input type="hidden" name="id">
          <div class="field">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required>
          </div>
          <div class="field">
            <label for="expense">Expense</label>
            <input id="expense" name="expense" type="text" required>
          </div>
          <div class="field">
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" min="0" step="0.01" required>
          </div>
          <div class="field">
            <label for="details">Details</label>
            <textarea id="details" name="details"></textarea>
          </div>
          <div class="form-actions">
            <button class="button" type="submit">Update Expense</button>
            <a class="button button-secondary" href="index.html">Cancel</a>
          </div>
        </form>
      </main>
    </div>
    <script src="../assets/app.js"></script>
  </body>
</html>
