<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expenses Categories | Fateer Wa Khameer Accounting</title>
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="../index.html">
          <strong>Fateer Wa Khameer</strong>
          <span>Accounting System</span>
        </a>
        <a class="nav-link" href="../index.html">Dashboard</a>
        <div class="nav-group-label">Expenses</div>
        <a class="nav-link" href="../expenses/index.html">Expenses</a>
        <a class="nav-link is-active" href="index.html">Expenses Categories</a>
      </aside>

      <main class="main">
        <div class="notice" data-notice></div>
        <header class="page-header">
          <div>
            <h1 class="page-title">Expenses Categories</h1>
            <p class="page-subtitle">Manage the names used for expense grouping.</p>
          </div>
          <a class="button" href="add.html">Add Category</a>
        </header>

        <section class="table-panel">
          <div class="table-toolbar">
            <strong>Categories List</strong>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody data-categories-body></tbody>
          </table>
          <div class="empty-state" data-categories-empty>No categories added yet.</div>
        </section>
      </main>
    </div>
    <script src="../assets/app.js"></script>
  </body>
</html>
