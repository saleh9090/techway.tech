<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Expense Category | Fateer Wa Khameer Accounting</title>
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="../index.html">
          <strong>Fateer Wa Khameer</strong>
          <span>Accounting System</span>
        </a>
        <a class="nav-link" href="../index.html">Dashboard</a>
        <div class="nav-group-label">Expenses</div>
        <a class="nav-link" href="../expenses/index.html">Expenses</a>
        <a class="nav-link is-active" href="index.html">Expenses Categories</a>
      </aside>

      <main class="main">
        <header class="page-header">
          <div>
            <h1 class="page-title">Edit Expense Category</h1>
            <p class="page-subtitle">After saving, you will return to the categories index.</p>
          </div>
        </header>

        <form class="form-panel form-grid" data-category-form>
          <input type="hidden" name="id">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="form-actions">
            <button class="button" type="submit">Update Category</button>
            <a class="button button-secondary" href="index.html">Cancel</a>
          </div>
        </form>
      </main>
    </div>
    <script src="../assets/app.js"></script>
  </body>
</html>
